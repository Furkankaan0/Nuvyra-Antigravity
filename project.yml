name: Nuvyra
options:
  bundleIdPrefix: com.nuvyra
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "${DEVELOPMENT_TEAM}"
    CODE_SIGN_STYLE: Automatic
    ENABLE_PREVIEWS: "YES"

packages:
  # Add SPM dependencies here as needed
  # Example:
  # KeychainAccess:
  #   url: https://github.com/kishikawakatsumi/KeychainAccess
  #   from: "4.2.2"

targets:
  Nuvyra:
    type: application
    platform: iOS
    sources:
      - path: Nuvyra
        excludes:
          - "**/.DS_Store"
    resources:
      - path: Nuvyra/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nuvyra.app
        INFOPLIST_GENERATION_MODE: GeneratedFile
        INFOPLIST_KEY_CFBundleDisplayName: Nuvyra
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UIStatusBarStyle: ""
        INFOPLIST_KEY_NSHealthShareUsageDescription: "Nuvyra, günlük adımlarını ve aktivite verilerini göstererek yürüyüş hedeflerini kişiselleştirmek için Apple Sağlık verilerini okur."
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "Nuvyra, yalnızca kullanıcı onayıyla wellness kayıtlarını Apple Sağlık ile senkronize etmek için sağlık verisi yazabilir."
        INFOPLIST_KEY_NSCameraUsageDescription: "Nuvyra, öğün fotoğrafını kaydederek tahmini besin değerlerini oluşturmak için kamerayı kullanır."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Nuvyra, seçtiğin öğün fotoğraflarını analiz veya kayıt amacıyla kullanır."
    entitlements:
      path: Nuvyra/Nuvyra.entitlements
    dependencies: []
    attributes:
      SystemCapabilities:
        com.apple.HealthKit:
          enabled: true
        com.apple.InAppPurchase:
          enabled: true

  NuvyraTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: NuvyraTests
    dependencies:
      - target: Nuvyra
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nuvyra.app.tests

  NuvyraUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: NuvyraUITests
    dependencies:
      - target: Nuvyra
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nuvyra.app.uitests

schemes:
  Nuvyra:
    build:
      targets:
        Nuvyra: all
        NuvyraTests: [test]
        NuvyraUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - NuvyraTests
        - NuvyraUITests
    archive:
      config: Release
